{% extends "base.html" %}
{% block title %}{{ titulo }} — BochoCredit{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card">
      <form method="POST">
        <div class="section-title">Cambiar Contraseña</div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Contraseña Actual *</label>
            <input type="password" name="passwordAntigua" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Nueva Contraseña *</label>
            <input type="password" name="passwordNueva" class="form-control" required>
          </div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Confirmar Contraseña *</label>
            <input type="password" name="passwordConfirm" class="form-control" required>
          </div>
        </div>
        <div class="d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-bc-primary px-4">
            <i class="bi bi-check-lg me-1"></i> Cambiar Contraseña
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
