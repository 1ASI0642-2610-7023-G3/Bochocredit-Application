{% extends "base.html" %}
{% block title %}{{ titulo }} — BochoCredit{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card">
      <form method="POST">
        <div class="section-title">Datos Personales</div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Nombres *</label>
            <input type="text" name="nombres" class="form-control" value="{{ usuario.nombres if usuario else '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos *</label>
            <input type="text" name="apellidos" class="form-control" value="{{ usuario.apellidos if usuario else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Username *</label>
            <input type="text" name="username" class="form-control" maxlength="50" value="{{ usuario.username if usuario else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" value="{{ usuario.email if usuario else '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Contraseña *</label>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>
        <div class="d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-bc-primary px-4">
            <i class="bi bi-check-lg me-1"></i> Guardar
          </button>
          <a href="{{ url_for('usuarios') }}" class="btn btn-light px-4">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
