<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BochoCredit — Iniciar Sesión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root {
    --bc-navy: #0f172a;
    --bc-blue: #3b82f6;
    --bc-blue2: #2563eb;
    --bc-cyan: #06b6d4;
    --bc-violet: #8b5cf6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--bc-navy);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Animated gradient background */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(59,130,246,.35) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,92,246,.28) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(6,182,212,.2) 0%, transparent 40%),
      linear-gradient(180deg, #0f172a 0%, #0c1627 100%);
  }

  /* Floating orbs */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(60px);
    animation: floatOrb 12s ease-in-out infinite alternate;
    pointer-events: none; z-index: 0;
  }
  .orb-1 { width:300px; height:300px; background:rgba(59,130,246,.15); top:-80px; left:-80px; animation-delay:0s; }
  .orb-2 { width:250px; height:250px; background:rgba(139,92,246,.12); bottom:-50px; right:-50px; animation-delay:-4s; }
  .orb-3 { width:180px; height:180px; background:rgba(6,182,212,.12); top:40%; right:15%; animation-delay:-7s; }

  @keyframes floatOrb {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(20px,30px) scale(1.1); }
  }

  /* Grid lines decoration */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Main wrapper */
  .login-wrap {
    width: 100%; max-width: 440px;
    padding: 1.5rem;
    position: relative; z-index: 10;
    animation: slideUp .55s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Logo section */
  .login-logo {
    text-align: center; margin-bottom: 2rem;
  }
  .logo-icon-big {
    width: 60px; height: 60px; border-radius: 18px;
    background: linear-gradient(135deg, var(--bc-blue) 0%, var(--bc-cyan) 100%);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1.6rem; color: #fff; font-weight: 900; margin-bottom: .9rem;
    box-shadow: 0 8px 32px rgba(59,130,246,.45);
    animation: pulseGlow 3s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 8px 32px rgba(59,130,246,.45); }
    50%       { box-shadow: 0 8px 48px rgba(6,182,212,.6); }
  }
  .logo-text-big { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -1px; }
  .logo-text-big span { color: var(--bc-cyan); }
  .login-tagline { color: rgba(255,255,255,.45); font-size: .83rem; margin-top: .3rem; }

  /* Card */
  .login-card {
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 24px;
    padding: 2.4rem 2.2rem;
    box-shadow:
      0 32px 80px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.08);
  }

  .card-title {
    color: #fff; font-weight: 800; font-size: 1.1rem;
    margin-bottom: .3rem;
  }
  .card-sub { color: rgba(255,255,255,.42); font-size: .83rem; margin-bottom: 1.8rem; }

  /* Form elements */
  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display: block; font-size: .8rem; font-weight: 700;
    color: rgba(255,255,255,.65); margin-bottom: .4rem; letter-spacing: .3px;
  }
  .input-wrap { position: relative; }
  .input-wrap .input-icon {
    position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,.35); font-size: .95rem; pointer-events: none;
    transition: color .2s;
  }
  .input-wrap input {
    width: 100%;
    background: rgba(255,255,255,.06);
    border: 1.5px solid rgba(255,255,255,.1);
    border-radius: 12px;
    padding: .68rem .9rem .68rem 2.6rem;
    color: #fff; font-size: .9rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    outline: none;
  }
  .input-wrap input::placeholder { color: rgba(255,255,255,.25); }
  .input-wrap input:focus {
    border-color: var(--bc-cyan);
    background: rgba(6,182,212,.08);
    box-shadow: 0 0 0 3px rgba(6,182,212,.15);
  }
  .input-wrap input:focus + .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--bc-cyan); }

  /* Divider */
  .divider { height: 1px; background: rgba(255,255,255,.08); margin: 1.5rem 0; }

  /* Login button */
  .btn-login {
    width: 100%; padding: .78rem;
    background: linear-gradient(135deg, var(--bc-blue) 0%, var(--bc-violet) 100%);
    color: #fff; border: none; border-radius: 12px;
    font-weight: 800; font-size: .95rem; font-family: inherit;
    cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 4px 20px rgba(59,130,246,.4);
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    position: relative; overflow: hidden;
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
    opacity: 0; transition: opacity .2s;
  }
  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(59,130,246,.55);
  }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0); }

  /* Demo hint */
  .demo-hint {
    background: rgba(59,130,246,.1);
    border: 1px solid rgba(59,130,246,.2);
    border-radius: 12px; padding: .85rem 1rem;
    font-size: .78rem; color: rgba(255,255,255,.6);
  }
  .demo-hint code {
    background: rgba(255,255,255,.12); border-radius: 5px;
    padding: .1rem .35rem; color: var(--bc-cyan); font-weight: 700;
  }
  .demo-hint strong { color: rgba(255,255,255,.8); }

  /* Error alert */
  .login-error {
    background: rgba(244,63,94,.1); border: 1px solid rgba(244,63,94,.25);
    border-radius: 10px; padding: .7rem 1rem;
    font-size: .83rem; color: #fca5a5; margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: .5rem;
  }

  /* Footer */
  .login-footer {
    text-align: center; margin-top: 1.5rem;
    color: rgba(255,255,255,.25); font-size: .72rem;
  }

  /* Decorative car */
  .deco-car {
    position: fixed; bottom: 2rem; right: 2rem;
    font-size: 5rem; color: rgba(255,255,255,.04);
    pointer-events: none; z-index: 0;
    animation: floatCar 6s ease-in-out infinite alternate;
  }
  @keyframes floatCar {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="deco-car"><i class="bi bi-car-front-fill"></i></div>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon-big">B</div>
    <div class="logo-text-big">Bocho<span>Credit</span></div>
    <div class="login-tagline">Sistema de Crédito Vehicular · Finanzas e Ingeniería</div>
  </div>

  <div class="login-card">
    <div class="card-title">Bienvenido de vuelta</div>
    <div class="card-sub">Ingresa tus credenciales para acceder al sistema</div>

    {% if error %}
    <div class="login-error">
      <i class="bi bi-exclamation-triangle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <div class="input-wrap">
          <input type="text" name="username" placeholder="Ingresa tu usuario" required autocomplete="username">
          <i class="bi bi-person input-icon"></i>
        </div>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrap">
          <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <i class="bi bi-lock input-icon"></i>
        </div>
      </div>
      <button type="submit" class="btn-login mt-2">
        <i class="bi bi-box-arrow-in-right"></i>
        Ingresar al Sistema
      </button>
    </form>

    <div class="divider"></div>

    <div class="demo-hint">
      <i class="bi bi-info-circle me-1" style="color:var(--bc-cyan)"></i>
      <strong>Demo:</strong> usuario <code>admin</code> / contraseña <code>admin123</code>
    </div>
  </div>

  <div class="login-footer">
    © 2026 BochoCredit · Finanzas e Ingeniería Económica · UPC
  </div>
</div>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
