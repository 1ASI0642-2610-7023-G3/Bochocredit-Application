{% extends "base.html" %}
{% block title %}{{ titulo }} — BochoCredit{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card">
      <form method="POST">
        <div class="section-title">Datos Personales</div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Nombres *</label>
            <input type="text" name="nombres" class="form-control" value="{{ cliente.nombres if cliente else '' }}"
              placeholder="Ej: Juan Carlos" minlength="2" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos *</label>
            <input type="text" name="apellidos" class="form-control" value="{{ cliente.apellidos if cliente else '' }}"
              placeholder="Ej: Pérez González" minlength="2" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">DNI *</label>
            <input type="text" name="dni" class="form-control" minlength="8" maxlength="8" pattern="\d{8}"
              value="{{ cliente.dni if cliente else '' }}" placeholder="Ej: 12345678" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Teléfono *</label>
            <input type="tel" name="telefono" class="form-control" value="{{ cliente.telefono if cliente else '' }}"
              placeholder="Ej: 987654321" pattern="^\+?\d{9,15}$" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}"
              placeholder="Ej: juan.perez@gmail.com" required>
          </div>
          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input type="text" name="direccion" class="form-control" value="{{ cliente.direccion if cliente else '' }}"
              placeholder="Ej: Av. Principal 123">
          </div>
        </div>
        <div class="d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-bc-primary px-4">
            <i class="bi bi-check-lg me-1"></i> Guardar
          </button>
          <a href="{{ url_for('clientes') }}" class="btn btn-light px-4">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
